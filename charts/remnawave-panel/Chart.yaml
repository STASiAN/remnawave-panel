apiVersion: v2
name: remnawave-panel
description: A Helm chart for deploying Remnawave Panel on Kubernetes
type: application
version: 0.4.0
appVersion: "2"
home: https://remnawave.github.io/panel
sources:
  - https://github.com/remnawave/backend
  - https://github.com/remnawave/remnawave-panel
keywords:
  - remnawave
  - vpn
  - panel
maintainers:
  - name: remnawave
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: |
        Split the panel and subscription routing into separate Ingress
        resources. The subscription Ingress is rendered only when
        subscription.enabled=true and supports its own className and
        annotations, falling back to ingress.className and
        ingress.annotations when unset.
dependencies:
  - name: cluster
    version: "0.6.0"
    repository: "https://cloudnative-pg.github.io/charts"
    alias: cnpg
    condition: cnpg.enabled
  - name: redis-ha
    version: "4.35.10"
    repository: "https://dandydeveloper.github.io/charts/"
    condition: redis-ha.enabled
