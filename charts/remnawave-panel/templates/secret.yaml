{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "remnawave-panel.fullname" . }}
  labels:
    {{- include "remnawave-panel.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT secrets
  {{- if .Values.jwt.authSecret }}
  JWT_AUTH_SECRET: {{ .Values.jwt.authSecret | quote }}
  {{- end }}
  {{- if .Values.jwt.apiTokensSecret }}
  JWT_API_TOKENS_SECRET: {{ .Values.jwt.apiTokensSecret | quote }}
  {{- end }}

  # Metrics credentials
  METRICS_USER: {{ .Values.metrics.user | quote }}
  {{- if .Values.metrics.pass }}
  METRICS_PASS: {{ .Values.metrics.pass | quote }}
  {{- end }}

  # Database URL (only when using external database)
  {{- if and (not .Values.cnpg.enabled) .Values.externalDatabase.url }}
  DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
  {{- end }}

  # Webhook secret
  {{- if .Values.webhook.secretHeader }}
  WEBHOOK_SECRET_HEADER: {{ .Values.webhook.secretHeader | quote }}
  {{- end }}

  # Telegram bot token
  {{- if .Values.telegram.botToken }}
  TELEGRAM_BOT_TOKEN: {{ .Values.telegram.botToken | quote }}
  {{- end }}

  # Redis password
  {{- if .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}

  # Subscription-page sidecar credentials
  {{- if .Values.subscription.enabled }}
  {{- if .Values.subscription.apiToken }}
  REMNAWAVE_API_TOKEN: {{ .Values.subscription.apiToken | quote }}
  {{- end }}
  {{- if and .Values.subscription.marzbanLegacy.enabled .Values.subscription.marzbanLegacy.secretKey }}
  MARZBAN_LEGACY_SECRET_KEY: {{ .Values.subscription.marzbanLegacy.secretKey | quote }}
  {{- end }}
  {{- if .Values.subscription.caddyAuthApiToken }}
  CADDY_AUTH_API_TOKEN: {{ .Values.subscription.caddyAuthApiToken | quote }}
  {{- end }}
  {{- end }}
{{- end }}
