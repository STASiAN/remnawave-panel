apiVersion: v1
kind: Service
metadata:
  name: {{ include "remnawave-panel.fullname" . }}
  labels:
    {{- include "remnawave-panel.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
    {{- if .Values.subscription.enabled }}
    - name: subscription
      port: {{ .Values.subscription.port }}
      targetPort: subscription
      protocol: TCP
    {{- end }}
  selector:
    {{- include "remnawave-panel.selectorLabels" . | nindent 4 }}
