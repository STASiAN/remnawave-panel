apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnawave-panel.fullname" . }}
  labels:
    {{- include "remnawave-panel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "remnawave-panel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "remnawave-panel.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "remnawave-panel.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "remnawave-panel.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "remnawave-panel.fullname" . }}
            - secretRef:
                name: {{ include "remnawave-panel.secretName" . }}
          env:
            {{- if .Values.cnpg.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "remnawave-panel.cnpg.secretName" . }}
                  key: uri
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.subscription.enabled }}
        - name: subscription-page
          image: {{ include "remnawave-panel.subscription.image" . | quote }}
          imagePullPolicy: {{ .Values.subscription.image.pullPolicy }}
          ports:
            - name: subscription
              containerPort: {{ .Values.subscription.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "remnawave-panel.fullname" . }}
            - secretRef:
                name: {{ include "remnawave-panel.secretName" . }}
          env:
            - name: APP_PORT
              value: {{ .Values.subscription.port | quote }}
            - name: REMNAWAVE_PANEL_URL
              value: {{ default (printf "http://localhost:%v" .Values.app.port) .Values.subscription.panelUrl | quote }}
          livenessProbe:
            {{- if .Values.subscription.probes.liveness.httpGet }}
            httpGet:
              {{- toYaml .Values.subscription.probes.liveness.httpGet | nindent 14 }}
            {{- else if .Values.subscription.probes.liveness.exec }}
            exec:
              {{- toYaml .Values.subscription.probes.liveness.exec | nindent 14 }}
            {{- else }}
            tcpSocket:
              port: subscription
            {{- end }}
            initialDelaySeconds: {{ .Values.subscription.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.subscription.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.subscription.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.subscription.probes.liveness.failureThreshold }}
            successThreshold: {{ .Values.subscription.probes.liveness.successThreshold }}
          readinessProbe:
            {{- if .Values.subscription.probes.readiness.httpGet }}
            httpGet:
              {{- toYaml .Values.subscription.probes.readiness.httpGet | nindent 14 }}
            {{- else if .Values.subscription.probes.readiness.exec }}
            exec:
              {{- toYaml .Values.subscription.probes.readiness.exec | nindent 14 }}
            {{- else }}
            tcpSocket:
              port: subscription
            {{- end }}
            initialDelaySeconds: {{ .Values.subscription.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.subscription.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.subscription.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.subscription.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.subscription.probes.readiness.successThreshold }}
          {{- with .Values.subscription.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.subscription.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
