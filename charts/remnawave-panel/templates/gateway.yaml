{{- if and .Values.gateway.enabled .Values.gateway.createGateway -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "remnawave-panel.fullname" . }}
  labels:
    {{- include "remnawave-panel.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ required "gateway.gatewayClassName is required when gateway.createGateway=true" .Values.gateway.gatewayClassName }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      {{- if .Values.gateway.hostnames }}
      hostname: {{ index .Values.gateway.hostnames 0 | quote }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- if .Values.gateway.tls }}
    - name: https
      protocol: HTTPS
      port: 443
      {{- if .Values.gateway.hostnames }}
      hostname: {{ index .Values.gateway.hostnames 0 | quote }}
      {{- end }}
      tls:
        {{- toYaml .Values.gateway.tls | nindent 8 }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
{{- end }}
