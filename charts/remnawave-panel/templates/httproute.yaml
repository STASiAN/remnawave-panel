{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "remnawave-panel.fullname" . }}
  labels:
    {{- include "remnawave-panel.labels" . | nindent 4 }}
  {{- with .Values.gateway.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.gateway.gatewayName }}
    - name: {{ .Values.gateway.gatewayName }}
    {{- end }}
    {{- range .Values.gateway.parentRefs }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- if .Values.gateway.hostnames }}
  hostnames:
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "remnawave-panel.fullname" . }}
          port: {{ .Values.app.port }}
{{- if and .Values.subscription.enabled (gt (len .Values.subscription.gateway.hostnames) 0) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "remnawave-panel.fullname" . }}-subscription
  labels:
    {{- include "remnawave-panel.labels" . | nindent 4 }}
  {{- with .Values.subscription.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.subscription.gateway.parentRefs }}
    {{- range .Values.subscription.gateway.parentRefs }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- else }}
    {{- if .Values.gateway.gatewayName }}
    - name: {{ .Values.gateway.gatewayName }}
    {{- end }}
    {{- range .Values.gateway.parentRefs }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
  hostnames:
    {{- range .Values.subscription.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "remnawave-panel.fullname" . }}
          port: {{ .Values.subscription.port }}
{{- end }}
{{- end }}
